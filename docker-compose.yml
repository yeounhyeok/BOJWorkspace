services:
  c-workspace:
    container_name: c-workspace
    # 1. 빌드 컨텍스트 추가: 현재 디렉토리(.)의 Dockerfile을 기반으로 빌드
    build:
      context: .
      dockerfile: Dockerfile
    # 2. 빌드된 이미지에 부여할 이름
    image: c-workspace:latest
    volumes:
      - ./workspace:/home/node/workspace:delegated
    ports:
      - "5000:5000"
    user: node
    tty: true
    stdin_open: true
    command: /bin/bash
    deploy:
      resources:
        limits:
          memory: 2G